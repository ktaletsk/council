# Multi-Agent Code Review Configuration
# ======================================
#
# agents: List of reviewers to run in parallel. Each entry specifies:
#   - backend: which CLI tool runs this reviewer
#   - model:   model identifier (format depends on backend)
#
# Supported backends:
#   "opencode"    → opencode run    (provider/model format)
#   "claude-code" → claude -p       (model alias or full name)
#   "codex"       → codex exec      (model name)
#   "cursor"      → cursor-agent    (model name)
#
# You can mix backends freely — run each model through whichever
# CLI tool you have access to.

agents:
  - backend: opencode
    model: amazon-bedrock/us.anthropic.claude-opus-4-6-v1

  - backend: opencode
    model: amazon-bedrock/us.anthropic.claude-sonnet-4-6

  - backend: opencode
    model: amazon-bedrock/qwen.qwen3-coder-30b-a3b-v1:0

  - backend: opencode
    model: opencode/minimax-m2.5-free

  - backend: opencode
    model: opencode/trinity-large-preview-free

  - backend: opencode
    model: opencode/big-pickle

  - backend: cursor
    model: gemini-3.1-pro

  - backend: cursor
    model: grok

  - backend: cursor
    model: gpt-5.3-codex
